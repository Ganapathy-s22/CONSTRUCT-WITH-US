{% extends "engineer_side/engineer_dashboard.html" %}
{% block content %}

<style>

.delete-wrapper{
  max-width:1100px;
  margin:auto;
  background:#fff;
  padding:30px;
  border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  position:relative;
}

.header-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.header-bar h2{
    color:rgb(8, 8, 56);
}

.section-title{
  font-size:22px;
  font-weight:700;
  margin:18px 0;
  color:#d00f0f;
}

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}

.form-group{
  margin-bottom:15px;
}

.form-group label{
  font-weight:600;
  font-size:14px;
}

.form-control{
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
  background:#f5f5f5;
}

.action-buttons{
  text-align:center;
  margin-top:30px;
}

.btn{
  padding:10px 25px;
  border:none;
  border-radius:4px;
  font-weight:600;
  cursor:pointer;
}

.delete-btn{
  background:#eb041b;
  color:#fff;
}

.cancel-btn{
  background:#6c757d;
  color:#fff;
  margin-left:10px;
}

.back-btn{
  background:#f60404;
  color:#fff;
  padding:6px 16px;
  text-decoration:none;
  border-radius:4px;
  font-weight:600;
}

.back-btn:hover{
  background:#ff7a18;
}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-box{
  background:#fff;
  padding:30px;
  border-radius:8px;
  
  width:400px;
  text-align:center;
}

.modal-box h3{
  margin-bottom:15px;
  color:#f1071e;
}

.modal-actions{
  margin-top:20px;
}

.modal-actions button{
  padding:8px 18px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:600;
}

.confirm-delete{
  background:#d60419;
  color:#fff;
  margin-bottom: 10px;
}

.modal-back{
  background:#1ca703;
  color:#fff;
  
}
.modal-box p{
    font-weight: 500;
}

</style>

<div class="delete-wrapper">

<div class="header-bar">
  <h2>Delete Construction Site</h2>

  <a href="{% url 'edit_delete_site' %}" class="back-btn">
    ← Back
  </a>
</div>

<div class="grid-2">

<!-- LEFT SIDE -->
<div>

<div class="section-title">Construction Site Details</div>

<div class="form-group">
<label>Site Name</label>
<input type="text" class="form-control"
value="{{ site.site_name }}" readonly>
</div>

<div class="form-group">
<label>Category</label>
<input type="text" class="form-control"
value="{{ site.get_category_display }}" readonly>
</div>

<div class="form-group">
<label>Total Sqft</label>
<input type="text" class="form-control"
value="{{ site.total_sqft }}" readonly>
</div>

<div class="form-group">
<label >Approximate Budget</label>
<input type="text" class="form-control"
value="₹ {{ site.approximate_budget }}" readonly>
</div>

<div class="form-group">
<label>Status</label>
<input type="text" class="form-control"
value="{{ site.get_status_display }}" readonly>
</div>

<div class="form-group">
<label>Address,District-Pincode</label>
<textarea class="form-control" readonly>
{{ site.site_address }}, {{ site.site_district }},
{{ site.site_state }} - {{ site.site_pincode }}
</textarea>
</div>

</div>

<!-- RIGHT SIDE -->
<div>

<div class="section-title">Owner Details</div>

<div class="form-group">
<label>Owner Name</label>
<input type="text" class="form-control"
value="{{ owner.owner_name }}" readonly>
</div>

<div class="form-group">
<label>Owner Phone</label>
<input type="text" class="form-control"
value="{{ owner.owner_phone }}" readonly>
</div>

<div class="form-group">
<label>Owner Address,District-Pincode</label>
<textarea class="form-control" readonly>
{{ owner.owner_address }},
{{ owner.owner_district }} - {{ owner.owner_pincode }}
</textarea>
</div>

</div>

</div>

<div class="action-buttons">
<button class="btn delete-btn"
onclick="openModal()">
Delete
</button>

<a href="{% url 'edit_delete_site' %}">
<button type="button" class="btn cancel-btn">
Cancel
</button>
</a>
</div>

</div>

<!-- ===== CONFIRM DELETE MODAL ===== -->

<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">

    <h3>Confirm Delete</h3>

    <p>
      If you click delete, your site and owner details
      will be permanently removed from the database.
    </p>

    <div class="modal-actions">
      <form method="POST">
        {% csrf_token %}
        <button type="submit" class="confirm-delete">
          Delete
        </button>
      </form>

      <button class="modal-back"
      onclick="closeModal()">
        Back
      </button>
    </div>

  </div>
</div>

<script>
function openModal(){
  document.getElementById("deleteModal").style.display="flex";
}

function closeModal(){
  document.getElementById("deleteModal").style.display="none";
}
</script>

{% endblock %}
