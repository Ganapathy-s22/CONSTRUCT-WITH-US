{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agency Login</title>
  <link rel="stylesheet" href="{% static 'css/users/login_agency.css' %}">
  
</head>

<style>
  .alert {
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 6px;
  font-weight: 600;
}

.alert.success {
  background: #e6ffed;
  color: #0f5132;
}

.alert.error {
  background: #ffe6e6;
  color: #842029;
}
</style>
<body>

<div class="login-wrapper">

  <h2>Supplier / Agency Login</h2>
  <p class="subtitle">Login to manage your business</p>

   {% if messages %}
  {% for message in messages %}
    <div class="alert {{ message.tags }}">
      {{ message|safe }}
    </div>
    {% endfor %}
   {% endif %}
 <br>


  <form method="post">
    {% csrf_token %}
  
    <!-- USERNAME -->
     <label>Username :</label>
    <input type="text" name="username" placeholder="Username" required>

    <!-- EMAIL -->
    <label>Email :</label>  
    <input type="email" name="email" placeholder="Email Address" required>

    <!-- PASSWORD -->
     <label>Password :</label>
    <div class="password-box">
      <input type="password" id="password" name="password" placeholder="Password" required>
      <span onclick="togglePassword('password',this)">Show</span>
    </div>
    <!-- SUBMIT -->
    <button type="submit" class="login-btn">Login</button>

  </form>

</div>

<script>
  function togglePassword(id, btn) {
    const field = document.getElementById(id);

    if (field.type === "password") {
      field.type = "text";      // show password
      btn.innerText = "Hide";
    } else {
      field.type = "password";  // show dots
      btn.innerText = "Show";
    }
  }
</script>


</body>
</html>
