{% extends "agency_side/agency_dashboard.html" %}

{% block content %}

<style>
/* ===== ADD PRODUCT FORM ===== */
.product-form {
  background: #ffffff;
  padding: 30px;
  border-radius: 8px;
  max-width: 900px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.06);
}

.product-form h3 {
  margin-bottom: 20px;
  color: #0b1c2d;
}

.form-row {
  display: flex;
  gap: 20px;
  margin-bottom: 18px;
}

.form-group {
  flex: 1;
}

.form-group label {
  display: block;
  margin-bottom: 6px;
  font-weight: 500;
  color: #333;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

textarea {
  resize: none;
  height: 80px;
}

/* buttons */
.form-actions {
  margin-top: 25px;
  display: flex;
  justify-content: flex-end;
  gap: 15px;
}

.btn {
  padding: 12px 22px;
  border-radius: 2px;
  border: none;
  cursor: pointer;
  font-size: 15px;
}

.btn-cancel {
  background: #0e6ba9;
  color: #ffffff;
}

.btn-cancel:hover{
  background-color: #0b1c2d;
}

.btn-save {
  background: #ff6a00;
  color: #ffffff;
}

.btn-save:hover {
  background: #f66402;
}

.product-tabs {
  display: flex;
  background: #ffffff;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 25px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.product-tab {
  flex: 1;
  text-align: center;
  text-decoration: none;
  padding: 14px 0;
  font-weight: 700;
  color: #0b1c2d;
  cursor: pointer;
  transition: 0.3s;
  border-right: 1px solid #e6e6e6;
}

.product-tab:last-child {
  border-right: none;
}

/* hover */
.product-tab:hover {
  color:white;
  background: #0b1c2d;
}


/* active tab */
.product-tab.active {
  background: #0b1c2d;
  color: #ffffff;
  font-weight: 400;
}

.subtitle {
  justify-content: center;
  color:#0b1c2d;
}

.add-product-wrapper{
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;   /* 👈 horizontal center */
}

.add-product-wrapper .subtitle{
  text-align: center;
  margin-bottom: 8px;
}

/* already irundha product-form width use pannum */
.product-form{
  width: 100%;
  max-width: 900px;
}

.form-actions a{
  text-decoration: none;
}

.alert {
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 6px;
  font-weight: 600;
}

.alert.success {
  background: #e6ffed;
  color: #0f5132;
}

.alert.error {
  background: #ffe6e6;
  color: #842029;
}

</style>

<div class="product-tabs">
  <a href="{% url 'agency_all_products' %}" class="product-tab {% if active_tab == 'all' %}active{% endif %}">
    All Products
  </a>

  <a href="{% url 'add_product' %}" class="product-tab {% if active_tab == 'add' %}active{% endif %}">
    Add Product
  </a>

   <a href="{% url 'add_product_variation' %}"
     class="product-tab {% if active_tab == 'variation' %}active{% endif %}">
     Add Product Variations
  </a>

  <a href="{% url 'edit_delete_product' %}" class="product-tab {% if active_tab == 'edit' %}active{% endif %}">
    Edit & Remove Product
  </a>

  
</div>
<div class="add-product-wrapper">
<h2 class="subtitle">Add Product</h2>
<p class="subtitle">Add construction materials like cement, steel, bricks, sand</p>

<div class="product-form">

  <h3>Product Details</h3>
 <div class="product-form">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- PRODUCT TYPE + BRAND -->
    <div class="form-row">
      <div class="form-group">
        <label>Product Type</label>
        <select name="product_type" required>
          <option value="">Select type</option>
          <option value="cement">Cement</option>
          <option value="steel">Steel</option>
          <option value="bricks">Bricks</option>
          <option value="sand">Sand</option>
          <option value="others">Others</option>
        </select>
      </div>
    </div>  

    <!-- OTHER PRODUCT TYPE (HIDDEN BY DEFAULT) -->
  <div class="form-row" id="otherProductRow" style="display:none;">
    <div class="form-group">
    <label>Other Product Name</label>
    <input type="text"
           name="other_product_type"
           placeholder="Enter product type (Eg: Gravel, Tiles)">
    </div>
  </div>


  <div class="form-row">
    <div class="form-group">
        <label>Brand Name</label>
        <input type="text" name="brand_name" placeholder="Ex: UltraTech, ACC" required>
    </div>
  </div>

    <!-- PRODUCT NAME -->
    <div class="form-row">
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" name="product_name" placeholder="Ex: UltraTech Cement" required>
      </div>
    </div>

    <!-- IMAGE -->
    <div class="form-row">
      <div class="form-group">
        <label>Product Image ( for better clarification )</label>
        <input type="file" name="image" accept="image/*">
      </div>
    </div>


    <!-- DESCRIPTION -->
    <div class="form-row">
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" placeholder="Brief product description"></textarea>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Address:</label>
        <textarea name="company_address"
                  class="editable"
                  readonly>{{ agency.company_address }}</textarea>
      </div>
    </div>

   <div class="form-row">
    <div class="form-group">
      <label>Pincode:</label>
      <input type="text" value="{{ agency.company_pincode }}" readonly>
    </div>
   </div>

    <!-- ACTIONS -->
    <div class="form-actions">
  <a href="{% url 'agency_all_products' %}" class="btn btn-cancel">
    Cancel
  </a>

  <button type="submit" class="btn btn-save">
    Create Product
  </button>
</div>


  </form></div></div>
</div>

<script>
const productTypeSelect = document.querySelector("select[name='product_type']");
const otherRow = document.getElementById("otherProductRow");

productTypeSelect.addEventListener("change", function () {

  if (this.value === "others") {
    otherRow.style.display = "block";
  } else {
    otherRow.style.display = "none";
  }

});
</script>


{% endblock %}
